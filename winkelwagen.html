<h2>Winkelwagen</h2>

<ul id="cartItems"></ul>
<!--knop om de winkelwagen te legen-->
<button onclick="clearCart()">Leeg winkelwagen</button>
<br><br>
<a href="producten.html">Terug naar winkel</a>

<!--script voor de winkelwagen-->
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let list = document.getElementById("cartItems");

cart.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
});

function clearCart() {
    localStorage.removeItem("cart");
    location.reload();
}
</script>
